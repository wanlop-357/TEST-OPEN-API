name: ApiDoc OpenAPI Artifact

on:
  push:
    branches:
      - main
      - develop
    paths:
      - openapi.yaml
      - openapi.json
      - src/**/*.ts
      - package.json
      - package-lock.json
  workflow_dispatch:

jobs:
  build-openapi:
    name: Generate OpenAPI artifact for apidoc.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate OpenAPI
        run: npm run openapi:generate

      - name: Validate OpenAPI
        run: npm run openapi:validate

      - name: Prepare apidoc.io instructions
        run: npm run apidoc:prepare

      - name: Upload OpenAPI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openapi-for-apidoc
          path: |
            openapi.yaml
            openapi.json
          retention-days: 14
